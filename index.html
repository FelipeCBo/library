<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>Document</title>
</head>
<body>
    <form class="book-form" id="bookForm">
        <input type="text" class="title input" id="title" placeholder="title" required>
        <input type="text" class="author input" id="author" placeholder="author" required>
        <input type="number" class="pages input" id="pages" placeholder="pages" required>
        <div class="read"><input type="checkbox" id="read"> Read</div>
        <button type="submit" class="submit input">Add book</button>
    </form>

    <div class="library" id="library"></div>

    <script src="script.js"></script>
</body>
</html>
